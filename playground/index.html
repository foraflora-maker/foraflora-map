<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foraflora — Satış Noktaları</title>

<!--
  iframe + GitHub Pages uyumluluk notları:
  • body { height:100% }       — 100dvh yerine, iframe içinde doğru çalışır
  • position: absolute          — fixed yerine (overlay, panel, toast, loading)
  • fetch('./dealers.json')     — GitHub Pages subdirectory için göreli path
  • Geolocation hatası          — izin yoksa Türkçe zarif toast mesajı
  • clipboard fallback          — execCommand ile eski tarayıcı desteği
  • system-font fallback        — Google Fonts CSP bloklamasına karşı güvenli
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="ls" role="status" aria-live="polite" aria-label="Yükleniyor">
  <img class="ls-logo" src="logo.svg" alt="Foraflora">
  <div class="ls-track"><div class="ls-fill"></div></div>
  <p class="ls-txt">Satış noktaları yükleniyor…</p>
</div>

<!-- TOAST -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- HEADER -->
<header class="app-hdr" role="banner">
  <div class="hdr-logo"><img src="logo.svg" alt="Foraflora"></div>
  <div class="hdr-div" aria-hidden="true"></div>
  <div class="hdr-meta">
    <div class="hdr-ttl">Satış Noktaları Haritası</div>
    <div class="hdr-sub">Türkiye genelindeki onaylı satış noktaları</div>
  </div>
  <div class="hdr-acts">
    <button class="hbtn" id="locBtn" aria-label="Mevcut konumuma git" title="Konumuma git">
      <svg class="loc-i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2" stroke-width="1.4"/></svg>
      <svg class="spin-i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9" stroke-linecap="round"/></svg>
      <span>Konumum</span>
    </button>
    <button class="hbtn hbtn-pri" id="filterBtn" onclick="togglePanel()" aria-expanded="false" aria-controls="panel" aria-label="Filtre panelini aç/kapat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span id="fBtnLbl">Filtrele</span>
    </button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar" role="status" aria-live="polite" aria-label="Harita istatistikleri">
  <div class="st"><div class="st-dot" style="background:var(--k400)"></div><span class="st-val" id="stTotal">—</span><span class="st-lbl">Toplam</span></div>
  <div class="st"><div class="st-dot" style="background:var(--brand)"></div><span class="st-val" id="stVis">—</span><span class="st-lbl">Gösterilen</span></div>
  <div class="st"><div class="st-dot" style="background:var(--uzman)"></div><span class="st-val" id="stUzman">—</span><span class="st-lbl">Uzman Bayi</span></div>
  <div class="st"><div class="st-dot" style="background:var(--bayi)"></div><span class="st-val" id="stBayi">—</span><span class="st-lbl">Bayi</span></div>
  <div class="st"><div class="st-dot" style="background:var(--satis)"></div><span class="st-val" id="stSatis">—</span><span class="st-lbl">Satış Noktası</span></div>
  <div class="st" style="border:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--k400)" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span class="st-val" id="stCity" style="font-size:12px;font-weight:600;color:var(--k600)">Türkiye</span>
  </div>
  <button class="fbadge" id="fbadge" onclick="resetFilters()" aria-label="Filtreleri temizle">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    <span id="fbadgeTxt">Filtre aktif</span>
  </button>
</div>

<!-- MAP -->
<div class="map-wrap">
  <div id="map" role="application" aria-label="Türkiye satış noktaları haritası"></div>

  <!-- Lejand -->
  <div class="legend" id="legend" role="complementary" aria-label="Harita lejandı">
    <div class="leg-ttl">Satış Noktası Tipi</div>
    <div class="leg-list">
      <div class="leg-row"><div class="leg-dot" style="background:var(--uzman)"></div><span class="leg-name">Uzman Bayi</span><span class="leg-cnt" id="legUz">—</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--bayi)"></div><span class="leg-name">Bayi</span><span class="leg-cnt" id="legBa">—</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:var(--satis)"></div><span class="leg-name">Satış Noktası</span><span class="leg-cnt" id="legSa">—</span></div>
    </div>
  </div>

  <!-- FABs -->
  <div class="map-fabs" role="group" aria-label="Harita kontrolleri">
    <button class="mfab" id="zIn"  title="Yakınlaştır" aria-label="Yakınlaştır"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button class="mfab" id="zOut" title="Uzaklaştır"  aria-label="Uzaklaştır"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button class="mfab" id="zFit" title="Tümünü göster" aria-label="Tüm satış noktalarını haritaya sığdır"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15h6v6h-6z"/></svg></button>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="togglePanel()" aria-hidden="true"></div>

  <!-- Filter Panel -->
  <aside class="panel" id="panel" role="complementary" aria-label="Filtre ve liste paneli" aria-hidden="true">

    <div class="pnl-hd">
      <h2 class="pnl-ttl">Filtreler</h2>
      <button class="pnl-cls" onclick="togglePanel()" aria-label="Paneli kapat" title="Kapat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="pnl-bar">
      <div class="pnl-cnt"><strong id="pnlCnt">—</strong> satış noktası</div>
      <button class="pnl-rst" id="pnlRst" onclick="resetFilters()" aria-label="Filtreleri sıfırla">Sıfırla ×</button>
    </div>

    <div class="pnl-body">

      <!-- Arama -->
      <div class="fsec">
        <label class="flbl" for="searchInput">Arama</label>
        <div class="fwrp">
          <span class="fico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" id="searchInput" placeholder="Eczane, şehir, adres veya telefon…" autocomplete="off" spellcheck="false" aria-label="Satış noktası ara">
          <button class="fclr" id="sClr" onclick="clearSearch()" aria-label="Aramayı temizle"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>

      <!-- Şehir -->
      <div class="fsec">
        <label class="flbl" for="citySelect">Şehir</label>
        <div class="fwrp">
          <span class="fico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
          <select id="citySelect" aria-label="Şehir seçin"><option value="">Tüm Şehirler</option></select>
          <span class="sarr"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></span>
        </div>
      </div>

      <!-- Tip -->
      <div class="fsec">
        <label class="flbl">Satış Noktası Tipi</label>
        <div class="type-btns" role="group" aria-label="Tip filtresi">
          <button class="tbtn on" data-type="all"   aria-pressed="true"><span>Tümü</span><span class="tcnt" id="cAll">—</span></button>
          <button class="tbtn"    data-type="uzman" aria-pressed="false"><span class="tdot" style="background:var(--uzman)"></span><span>Uzman Bayi</span><span class="tcnt" id="cUzman">—</span></button>
          <button class="tbtn"    data-type="bayi"  aria-pressed="false"><span class="tdot" style="background:var(--bayi)"></span><span>Bayi</span><span class="tcnt" id="cBayi">—</span></button>
          <button class="tbtn"    data-type="satis" aria-pressed="false"><span class="tdot" style="background:var(--satis)"></span><span>Satış Noktası</span><span class="tcnt" id="cSatis">—</span></button>
        </div>
      </div>

      <!-- Liste -->
      <div class="dlr-sec">
        <label class="flbl">Satış Noktaları</label>
        <div id="dealerList" role="list" aria-label="Satış noktaları listesi"></div>
        <div class="empty" id="emptyState" role="status">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <div class="empty-ttl">Sonuç bulunamadı</div>
          <div class="empty-sub">Farklı bir arama veya filtre deneyin</div>
        </div>
      </div>

    </div>
  </aside>
</div><!-- /map-wrap -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
/* ──────────────────────────────────────────────────────
   CONSTANTS
────────────────────────────────────────────────────── */
const C = { uzman:'#d4692a', bayi:'#4e7453', satis:'#2c5fa8' };
const L_= { uzman:'Uzman Bayi', bayi:'Bayi', satis:'Satış Noktası' };
const B = { uzman:'#fdf1ea', bayi:'#eaf1eb', satis:'#e9eef8' };
const $ = id => document.getElementById(id);

/* ──────────────────────────────────────────────────────
   MAP
   CartoDB Light — daha temiz görünüm
────────────────────────────────────────────────────── */
const map = L.map('map', { zoomControl:false, attributionControl:true })
              .setView([39, 35], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org/copyright" target="_blank">OSM</a> &copy; <a href="https://carto.com/" target="_blank">CARTO</a>',
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);
map.attributionControl.setPrefix(false);

/* ──────────────────────────────────────────────────────
   FAB CONTROLS
────────────────────────────────────────────────────── */
$('zIn').onclick  = () => map.zoomIn();
$('zOut').onclick = () => map.zoomOut();
$('zFit').onclick = () => { if (gBounds) map.fitBounds(gBounds.pad(.05)); };

/* ──────────────────────────────────────────────────────
   LOCATE ME
   ✅ iframe izin yoksa Türkçe zarif hata mesajı
────────────────────────────────────────────────────── */
let locMark = null;
$('locBtn').onclick = function () {
  if (!navigator.geolocation) { showToast('Tarayıcınız konum özelliğini desteklemiyor'); return; }
  const btn = this;
  btn.classList.add('locating');
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    ({ coords: { latitude: lat, longitude: lng } }) => {
      btn.classList.remove('locating'); btn.disabled = false;
      if (locMark) map.removeLayer(locMark);
      locMark = L.circleMarker([lat, lng], { radius:9, color:'#fff', weight:3, fillColor:'#4e7453', fillOpacity:1 })
                 .addTo(map).bindPopup('<b style="font-family:Inter,sans-serif;font-size:13px">Konumunuz</b>').openPopup();
      map.setView([lat, lng], 13);
    },
    err => {
      btn.classList.remove('locating'); btn.disabled = false;
      showToast(err.code === 1 ? 'Konum izni verilmedi' : err.code === 3 ? 'Konum zaman aşımına uğradı' : 'Konum alınamadı');
    },
    { timeout:10000, maximumAge:60000 }
  );
};

/* ──────────────────────────────────────────────────────
   CLUSTER
────────────────────────────────────────────────────── */
function mkCluster(cl) {
  const cnt = {}; cl.getAllChildMarkers().forEach(m => { const t=m.options.dealerType; cnt[t]=(cnt[t]||0)+1; });
  const types=Object.keys(cnt), total=cl.getChildCount();
  const size=total>50?54:total>20?48:42, fs=total>99?10:13;

  if (types.length===1) {
    const c=C[types[0]];
    return L.divIcon({ html:`<div style="position:relative;width:${size}px;height:${size}px">
      <div style="position:absolute;inset:0;background:${c};opacity:.12;border-radius:50%;transform:scale(1.28)"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,${c},${c}cc);border-radius:50%;border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${fs}px;font-family:Inter,sans-serif">${total}</div>
    </div>`, className:'', iconSize:[size,size] });
  }

  const segs=types.map((t,i)=>{
    const pct=(cnt[t]/total)*100, start=types.slice(0,i).reduce((s,x)=>s+(cnt[x]/total)*100,0);
    return `${C[t]} ${start}% ${start+pct}%`;
  }).join(',');

  return L.divIcon({ html:`<div style="position:relative;width:${size}px;height:${size}px">
    <div style="position:absolute;inset:0;background:conic-gradient(${segs});opacity:.12;border-radius:50%;transform:scale(1.28)"></div>
    <div style="position:absolute;inset:0;background:conic-gradient(${segs});border-radius:50%;border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.16)"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${fs}px;font-family:Inter,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.3)">${total}</div>
  </div>`, className:'', iconSize:[size,size] });
}

const clGroup = L.markerClusterGroup({
  iconCreateFunction: mkCluster, spiderfyOnMaxZoom:true,
  showCoverageOnHover:false, zoomToBoundsOnClick:true,
  maxClusterRadius:60, animate:true
});
map.addLayer(clGroup);

/* ──────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────── */
const all=[], state={city:'',type:'all',search:''};
let gBounds=null, totCnt={uzman:0,bayi:0,satis:0}, stimer=null;

/* ──────────────────────────────────────────────────────
   PANEL
────────────────────────────────────────────────────── */
function togglePanel() {
  const p=$('panel'), ov=$('overlay'), btn=$('filterBtn'), lbl=$('fBtnLbl');
  const open=p.classList.toggle('open');
  ov.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', String(open));
  p.setAttribute('aria-hidden', String(!open));
  if (open) { btn.classList.replace('hbtn-pri','hbtn-open'); lbl.textContent='Kapat'; }
  else       { btn.classList.replace('hbtn-open','hbtn-pri'); lbl.textContent='Filtrele'; }
}

/* ──────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────── */
let tTimer=null;
function showToast(msg) {
  const el=$('toast'); el.textContent=msg; el.classList.add('on');
  clearTimeout(tTimer); tTimer=setTimeout(()=>el.classList.remove('on'),2500);
}

/* ──────────────────────────────────────────────────────
   COPY ADDRESS
   ✅ execCommand fallback — eski tarayıcılar
────────────────────────────────────────────────────── */
function copyAddr(addr) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(addr).then(()=>showToast('Adres kopyalandı ✓')).catch(()=>fbCopy(addr));
  } else { fbCopy(addr); }
}
function fbCopy(t) {
  const ta=document.createElement('textarea');
  ta.value=t; ta.style.cssText='position:absolute;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('Adres kopyalandı ✓'); }
  catch { showToast('Kopyalanamadı'); }
  document.body.removeChild(ta);
}

/* ──────────────────────────────────────────────────────
   PIN
────────────────────────────────────────────────────── */
function mkPin(d) {
  const c=C[d.type], u=d.type==='uzman';
  const gDef=u?`<defs><filter id="g${d._i}" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`:'';
  const gRing=u?`<path d="M32 6C18 10,10 22,10 38C10 52,21 62,28 70C31 74,33 78,33.5 82C35 78,36 74,39 70C46 62,54 52,54 38C54 22,46 10,32 6Z" fill="${c}" opacity=".2" transform="scale(1.12) translate(-2.2,-2.2)"/>`:'';
  return L.divIcon({
    className:'', iconSize:[28,38], iconAnchor:[14,38], popupAnchor:[0,-40],
    html:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 84" width="28" height="38"
      style="filter:drop-shadow(0 3px 6px rgba(0,0,0,.2))${u?`;drop-shadow(0 0 8px ${c}66)`:''}">
      ${gDef}${gRing}
      <path d="M32 6C18 10,10 22,10 38C10 52,21 62,28 70C31 74,33 78,33.5 82C35 78,36 74,39 70C46 62,54 52,54 38C54 22,46 10,32 6Z"
        fill="${c}"${u?` filter="url(#g${d._i})"`:''}/>
      <path d="M30 28C25 33,26 41,32 45C38 48,42 43,41 36C40 30,34 25,30 28Z" fill="rgba(255,255,255,.88)"/>
      <path d="M32 30C31 35,34 37,33 41" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>`
  });
}

/* ──────────────────────────────────────────────────────
   POPUP
────────────────────────────────────────────────────── */
function mkPopup(d) {
  const c=C[d.type], bg=B[d.type], lb=L_[d.type];
  const mUrl=`https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}`;
  const sa=(d.address||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
  return `<div class="pb">
    <span class="pb-type" style="background:${bg};color:${c}">${lb}</span>
    <div class="pb-name">${d.name}</div>
    ${d.city?`<div class="pb-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${d.city}</div>`:''}
    ${d.address?`<div class="pb-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>${d.address}</span></div>`:''}
    ${d.phone?`<div class="pb-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 15.1 19.79 19.79 0 0 1 1.62 6.49 2 2 0 0 1 3.6 4.44h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 12a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.56 19.18z"/></svg><a href="tel:${d.phone}" onclick="event.stopPropagation()">${d.phone}</a></div>`:''}
    <div class="pb-acts">
      <a href="${mUrl}" target="_blank" rel="noopener noreferrer" class="pb-btn pb-btn-p" onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Yol Tarifi
      </a>
      ${d.address?`<button class="pb-btn pb-btn-s" onclick="copyAddr('${sa}');event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Adresi Kopyala
      </button>`:''}
    </div>
  </div>`;
}

/* ──────────────────────────────────────────────────────
   LOAD
────────────────────────────────────────────────────── */
function loadDealers(data) {
  const cities=new Set(); let idx=0;
  data.dealers.forEach(d => {
    d._i=idx++;
    cities.add(d.city);
    totCnt[d.type]=(totCnt[d.type]||0)+1;
    const m=L.marker([d.lat,d.lng],{dealerType:d.type,dealerData:d,icon:mkPin(d)});
    m.bindPopup(mkPopup(d),{maxWidth:300,minWidth:250});
    m.on('popupopen',  ()=>{ if(window.innerWidth<=600) $('legend').classList.add('hidden'); });
    m.on('popupclose', ()=>$('legend').classList.remove('hidden'));
    all.push({marker:m, data:d});
  });

  [...cities].sort((a,b)=>a.localeCompare(b,'tr')).forEach(c=>{
    const o=document.createElement('option'); o.value=c; o.textContent=c;
    $('citySelect').appendChild(o);
  });

  const tot=all.length;
  ['stTotal','cAll'].forEach(id=>$(id).textContent=tot);
  $('cUzman').textContent=$('stUzman').textContent=$('legUz').textContent=totCnt.uzman||0;
  $('cBayi').textContent =$('stBayi').textContent =$('legBa').textContent=totCnt.bayi ||0;
  $('cSatis').textContent=$('stSatis').textContent=$('legSa').textContent=totCnt.satis||0;

  gBounds=L.featureGroup(all.map(o=>o.marker)).getBounds();
  applyFilters();
  setTimeout(()=>$('ls').classList.add('done'), 500);
}

/* ──────────────────────────────────────────────────────
   APPLY FILTERS
────────────────────────────────────────────────────── */
function applyFilters() {
  clGroup.clearLayers();
  const listEl=$('dealerList'); listEl.innerHTML='';
  const q=state.search.toLowerCase().trim();

  const vis=all.filter(({data:d})=>{
    return (!state.city || d.city===state.city)
        && (state.type==='all' || d.type===state.type)
        && (!q || d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q)
               || (d.address&&d.address.toLowerCase().includes(q))
               || (d.phone&&d.phone.includes(q)));
  });

  const vc={uzman:0,bayi:0,satis:0};
  vis.forEach(({data:d})=>{ vc[d.type]=(vc[d.type]||0)+1; });
  vis.forEach(({marker:m})=>clGroup.addLayer(m));

  vis.forEach(({marker:m, data:d})=>{
    const c=C[d.type], bg=B[d.type];
    const el=document.createElement('div');
    el.className='di'; el.setAttribute('role','listitem');
    el.setAttribute('tabindex','0'); el.setAttribute('aria-label',`${d.name}, ${d.city}`);
    el.innerHTML=`
      <div class="di-name">${d.name}</div>
      <div class="di-meta">
        <span class="di-city"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${d.city}</span>
        <span class="di-chip" style="background:${bg};color:${c}">${L_[d.type]}</span>
      </div>
      ${d.address?`<div class="di-addr">${d.address}</div>`:''}
      ${d.phone?`<div class="di-row">
        <a class="di-tel" href="tel:${d.phone}" onclick="event.stopPropagation()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 15.1 19.79 19.79 0 0 1 1.62 6.49 2 2 0 0 1 3.6 4.44h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 12a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.56 19.18z"/></svg>${d.phone}</a>
        <a class="di-go" href="https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Git
        </a>
      </div>`:''}`;
    el.onclick=()=>{ map.setView(m.getLatLng(),15); m.openPopup(); if(window.innerWidth<=600) togglePanel(); };
    el.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); el.click(); } };
    listEl.appendChild(el);
  });

  $('emptyState').classList.toggle('on', vis.length===0);

  const vl=vis.length;
  $('stVis').textContent=$('pnlCnt').textContent=vl;
  $('legUz').textContent=vc.uzman||0; $('legBa').textContent=vc.bayi||0; $('legSa').textContent=vc.satis||0;
  $('stCity').textContent=state.city||'Türkiye';

  const hf=!!(state.city||state.type!=='all'||state.search);
  $('fbadge').classList.toggle('on',hf);
  $('pnlRst').classList.toggle('on',hf);
  if(hf){ const p=[]; if(state.city) p.push(state.city); if(state.type!=='all') p.push(L_[state.type]); if(state.search) p.push(`"${state.search}"`); $('fbadgeTxt').textContent=p.join(' · '); }

  if(state.city && vis.length>0) { const g=L.featureGroup(vis.map(o=>o.marker)); map.fitBounds(g.getBounds().pad(.15)); }
}

/* ──────────────────────────────────────────────────────
   RESET / CLEAR
────────────────────────────────────────────────────── */
function resetFilters() {
  state.city=''; state.type='all'; state.search='';
  $('citySelect').value=''; $('searchInput').value=''; $('sClr').classList.remove('on');
  document.querySelectorAll('.tbtn').forEach(b=>{ const a=b.dataset.type==='all'; b.classList.toggle('on',a); b.setAttribute('aria-pressed',String(a)); });
  applyFilters();
  if(gBounds) map.fitBounds(gBounds.pad(.05));
}
function clearSearch() {
  $('searchInput').value=''; $('sClr').classList.remove('on');
  state.search=''; applyFilters();
}

/* ──────────────────────────────────────────────────────
   EVENTS
────────────────────────────────────────────────────── */
$('citySelect').onchange=e=>{ state.city=e.target.value; applyFilters(); };
$('searchInput').oninput=e=>{
  const v=e.target.value; $('sClr').classList.toggle('on',v.length>0);
  clearTimeout(stimer); stimer=setTimeout(()=>{ state.search=v; applyFilters(); },220);
};
document.querySelectorAll('.tbtn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tbtn').forEach(b=>{ b.classList.remove('on'); b.setAttribute('aria-pressed','false'); });
    btn.classList.add('on'); btn.setAttribute('aria-pressed','true');
    state.type=btn.dataset.type; applyFilters();
  };
});

/* ──────────────────────────────────────────────────────
   FETCH
   ✅ './dealers.json' — GitHub Pages subdirectory uyumlu
────────────────────────────────────────────────────── */
fetch('./dealers.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(loadDealers)
  .catch(err=>{
    $('ls').classList.add('done');
    console.error('dealers.json yüklenemedi:', err);
    document.querySelector('.map-wrap').insertAdjacentHTML('afterbegin',`
      <div style="position:absolute;inset:0;z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#fff;padding:40px;text-align:center">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#d4692a" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style="font-size:15px;font-weight:700;color:#090c10">Veriler yüklenemedi</p>
        <p style="font-size:12px;color:#8891a4;max-width:260px;line-height:1.6"><code>dealers.json</code> dosyasının bu sayfayla aynı klasörde olduğundan emin olun.</p>
        <button onclick="location.reload()" style="margin-top:4px;padding:9px 20px;background:#4e7453;color:#fff;border:none;border-radius:8px;font-family:Inter,sans-serif;font-size:12.5px;font-weight:700;cursor:pointer">Yeniden Dene</button>
      </div>`);
  });
</script>
</body>
</html>
